<!DOCTYPE html>
<html>
<head>
  <title>チャット</title>
  <style>
    body {
      background: black;
      color: white;
      text-align: center;
    }
    #chat {
      border: 1px solid white;
      height: 500px;
      overflow-y: scroll;
      margin: 10px;
      padding: 10px;
    }
  </style>
</head>
<body>

<h1>チャット</h1>

<div id="chat"></div>

<input type="text" id="message" placeholder="メッセージ入力">
<button onclick="sendMessage()">送信</button>

<script>
function sendMessage() {
  let input = document.getElementById("message");
  let chat = document.getElementById("chat");

  let msg = input.value;
  if (msg !== "") {
    chat.innerHTML += "<p>" + msg + "</p>";
    input.value = "";
  }
}
</script>

</body>
